<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Evil Taxi v5</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;overscroll-behavior:none;background:linear-gradient(180deg,#fff7e8,#ead9b8);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;color:#1d1a16}.wrap{width:min(100vw,440px);margin:0 auto;padding:10px 10px 16px}.title{display:flex;justify-content:space-between;align-items:center;padding:8px 4px}.title h1{margin:0;font-size:20px;letter-spacing:.02em}.pill{font-size:12px;font-weight:900;background:#1d1a16;color:#fff8eb;border-radius:999px;padding:6px 9px}.board{border:3px solid #1d1a16;border-radius:22px;overflow:hidden;background:#f6f4ec;box-shadow:0 8px 0 rgba(29,26,22,.15)}canvas{display:block;width:100%;height:auto;touch-action:none}.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding-top:12px}button{border:3px solid #1d1a16;border-radius:16px;min-height:48px;background:#fffaf0;color:#1d1a16;font-size:15px;font-weight:900;box-shadow:0 5px 0 rgba(29,26,22,.16)}button.primary{background:linear-gradient(180deg,#ffe174,#ff8c1f)}button:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(29,26,22,.16)}button:disabled{opacity:.42}.status{margin-top:10px;min-height:46px;padding:10px 12px;border:3px solid #1d1a16;border-radius:16px;background:#fffaf0;font-size:13px;line-height:1.38;font-weight:800}.tip{margin-top:8px;font-size:12px;line-height:1.45;color:#604225;padding:0 4px}.tip b{color:#1d1a16}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="title"><h1>🚕 Evil Taxi</h1><div class="pill">v5 闯关版</div></div>
    <section class="board"><canvas id="game" width="390" height="680"></canvas></section>
    <div class="controls"><button id="resetBtn">重画路线</button><button id="driveBtn" class="primary" disabled>开始开车</button><button id="nextBtn" disabled>下一关</button></div>
    <div id="status" class="status">点击画面开始接单。</div>
    <div class="tip"><b>玩法：</b>像导航一样沿道路画路线。赚够目标金额且怀疑值不爆表才能通关；建筑、河面、非道路区域不能走。</div>
  </main>
  <script src="./game.js?v=5"></script>
</body>
</html>
