<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Evil Taxi 绕路司机</title>
  <style>
    :root{--bg:#f5f0df;--ink:#1e1a16;--orange:#ff8a1f;--cream:#fffaf0;}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{margin:0;min-height:100%;background:radial-gradient(circle at 18% 0%, rgba(255,178,84,.42), transparent 30%),linear-gradient(180deg,#fff8e7,#eadbbd);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;overscroll-behavior:none;}
    .wrap{width:min(100vw,440px);margin:0 auto;padding:10px 10px 16px;}
    .title{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 4px;}
    .title h1{margin:0;font-size:20px;line-height:1;letter-spacing:.03em;}
    .pill{font-size:12px;font-weight:900;color:#fffaf0;background:#1e1a16;border:2px solid #1e1a16;border-radius:999px;padding:6px 9px;box-shadow:0 3px 0 rgba(0,0,0,.14);white-space:nowrap;}
    .board{position:relative;background:#fffaf0;border:3px solid #1e1a16;border-radius:22px;box-shadow:0 8px 0 rgba(30,26,22,.16);overflow:hidden;}
    canvas{display:block;width:100%;height:auto;touch-action:none;background:#f7f5ec;}
    .controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px 0 0;}
    button{appearance:none;border:3px solid #1e1a16;border-radius:16px;min-height:48px;padding:8px 10px;background:#fffaf0;color:#1e1a16;font-weight:900;font-size:15px;box-shadow:0 5px 0 rgba(30,26,22,.18);cursor:pointer;}
    button.primary{background:linear-gradient(180deg,#ffd46b,#ff8a1f);}
    button:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(30,26,22,.18);}
    button:disabled{opacity:.42;cursor:not-allowed;transform:none;box-shadow:0 5px 0 rgba(30,26,22,.08);}
    .status{margin-top:10px;min-height:46px;padding:10px 12px;border:3px solid #1e1a16;border-radius:16px;background:#fffaf0;font-size:13px;line-height:1.38;font-weight:800;}
    .tip{margin-top:8px;font-size:12px;line-height:1.45;color:#614225;padding:0 4px;}
    .tip b{color:#1e1a16;}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="title"><h1>🚕 Evil Taxi</h1><div class="pill">绕路司机 Demo v3</div></div>
    <section class="board"><canvas id="game" width="390" height="680" aria-label="Evil Taxi 绕路司机游戏画布"></canvas></section>
    <div class="controls"><button id="resetBtn">重画路线</button><button id="driveBtn" class="primary" disabled>开始开车</button><button id="nextBtn" disabled>下一关</button></div>
    <div id="status" class="status">点击画面开始接单。</div>
    <div class="tip"><b>玩法：</b>路线会自动吸附到道路；建筑物和水面不能画路线。路线越长钱越多，但红区会加怀疑，蓝区能当绕路借口。</div>
  </main>
  <script src="./game.js?v=3"></script>
</body>
</html>
